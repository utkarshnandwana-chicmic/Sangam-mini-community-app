<div class="layout-container">

  <div class="state-layer loading" *ngIf="profileLoading()">
    <div class="spinner"></div>
  </div>

  <!-- PROFILE -->
  <main class="profile-content" *ngIf="!profileLoading() && profile() as profile">

    <app-profile-header [profile]="profile"></app-profile-header>

    <div class="content-body">

      <!-- STATS -->
<app-profile-stats
  class="stats-section"
  [postsCount]="profile.postsCount"
  [followerCount]="profile.followerCount"
  [followingCount]="profile.followingCount"
  [connectionsClickable]="canViewConnections"
  (openFollowers)="openFollowersModal()"
  (openFollowing)="openFollowingModal()">
</app-profile-stats>

      <!-- GRID SECTION -->
      <div class="grid-section">

        <!-- TABS -->
        <div class="tabs">

          <button
            class="tab"
            [class.active]="activeTab() === 'posts'"
            (click)="switchToPosts()">
            POSTS
          </button>

          <button
          *ngIf="isOwnProfile"
            class="tab"
            [class.active]="activeTab() === 'saved'"
            (click)="switchToSaved()">
            SAVED
          </button>

        </div>

        <!-- POSTS GRID -->
        <app-profile-posts-grid
          *ngIf="activeTab() === 'posts' && canViewPrivateContent"
          [posts]="posts()"
          (toggleLike)="onToggleLike($event)"
          (viewPost)="onViewPost($event)">
        </app-profile-posts-grid>

        <div
          *ngIf="activeTab() === 'posts' && !canViewPrivateContent"
          class="private-account-state">
          <button class="lock-pill" type="button" disabled>
            🔒 Private Account
          </button>
          <p class="private-account-message">
            This account is private. Follow this user and wait for acceptance to view posts.
          </p>
        </div>

        <!-- SAVED GRID -->
        <app-profile-posts-grid
          *ngIf="activeTab() === 'saved'"
          [posts]="savedPosts()"
          (toggleLike)="onToggleLike($event)"
          (viewPost)="onViewPost($event)">
        </app-profile-posts-grid>

        <!-- EMPTY STATE -->
        <div
          *ngIf="activeTab() === 'saved' && !savedPosts().length"
          class="empty-state">
          <p>No saved posts yet.</p>
        </div>

      </div>
    </div>

    <!-- POST MODAL -->
    <app-post-modal
      *ngIf="selectedPost() as selectedPost"
      [post]="selectedPost"
      [profile]="profile"
      (close)="closePost()"
      (toggleLike)="onToggleLike($event)"
      (toggleSave)="onToggleSave($event)"
      (editPost)="openEditModal($event)">
    </app-post-modal>

    <!-- EDIT POST MODAL -->
    <app-add-post-modal
      *ngIf="showEditModal"
      [editMode]="true"
      [editPost]="selectedEditPost"
      (close)="closeEditModal()">
    </app-add-post-modal>

    <div
      *ngIf="showFollowListModal()"
      class="follow-modal-backdrop"
      (click)="closeFollowListModal()">
      <div class="follow-modal" (click)="$event.stopPropagation()">
        <div class="follow-modal-header">
          <div class="follow-tabs">
            <button
              class="follow-tab"
              [class.active]="activeFollowListTab() === 'followers'"
              (click)="setFollowListTab('followers')">
              Followers
            </button>
            <button
              class="follow-tab"
              [class.active]="activeFollowListTab() === 'following'"
              (click)="setFollowListTab('following')">
              Following
            </button>
          </div>
          <button class="modal-close" (click)="closeFollowListModal()">×</button>
        </div>

        <div class="follow-modal-content">
          <div class="follow-empty" *ngIf="followListLoading()">
            Loading...
          </div>

          <div class="follow-empty" *ngIf="!followListLoading() && !followUsers().length">
            No {{ activeFollowListTab() }} found.
          </div>

          <div
            class="follow-user-row"
            *ngFor="let user of followUsers(); trackBy: trackByFollowUserId"
            (click)="navigateToFollowUser(user._id)">
            <img
              class="follow-avatar"
              [src]="user.profilePicture ? (user.profilePicture | imageUrl) : '/default-avatar.svg'"
              alt="User avatar" />
            <div class="follow-meta">
              <span class="follow-username">{{ user.userName || user.name }}</span>
              <span class="follow-name" *ngIf="user.name">{{ user.name }}</span>
            </div>
            <button
              *ngIf="shouldShowRemoveFollowerButton(user)"
              type="button"
              class="list-follow-btn following"
              [disabled]="isFollowListActionLoading(user._id)"
              (click)="onRemoveFollowerFromList($event, user)">
              Remove
            </button>
            <button
              *ngIf="!shouldShowRemoveFollowerButton(user) && user._id !== loggedInUserId"
              type="button"
              class="list-follow-btn"
              [class.following]="user.isFollowing || user.isRequestedFollowing"
              [disabled]="isFollowListActionLoading(user._id)"
              (click)="onToggleFollowFromList($event, user)">
              {{ getFollowListButtonLabel(user) }}
            </button>
          </div>
        </div>
      </div>
    </div>

  </main>

  <div class="state-layer error" *ngIf="!profileLoading() && !profile()">
    <div class="error-toast">Unable to load profile.</div>
  </div>

</div>
