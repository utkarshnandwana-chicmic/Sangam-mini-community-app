<section class="home-feed">
  <div class="state" *ngIf="loading()">Loading feed...</div>

  <article
    class="post-card"
    *ngFor="let post of posts(); trackBy: trackByPostId">
    <header class="post-header">
      <img
        class="avatar"
        [src]="(post.user?.profilePicture || post.profilePicture) ? ((post.user?.profilePicture || post.profilePicture) | imageUrl) : '/default-avatar.svg'"
        alt="Profile picture" />
      <div class="author">
        <button
          class="username-link"
          (click)="goToUserProfile($event, post.user?._id || post.userId)">
          {{ post.user?.userName || post.userName || 'user' }}
        </button>
        <span class="location-line">{{ locationText(post) || '\u00A0' }}</span>
      </div>
    </header>

    <div class="media-wrap" *ngIf="currentMedia(post) as media">
      <div class="media-viewport">
        <img
          *ngIf="media.mediaType !== 2"
          [src]="media.completeUrl || media.thumbnailUrl || media.url"
          alt="Post media"
          class="media" />
        <video
          *ngIf="media.mediaType === 2"
          [src]="media.completeUrl || media.url"
          class="media"
          controls
          preload="metadata"></video>
      </div>

      <button
        *ngIf="hasMultipleMedia(post)"
        class="media-nav prev"
        (click)="prevMedia($event, post)">
        ‹
      </button>
      <button
        *ngIf="hasMultipleMedia(post)"
        class="media-nav next"
        (click)="nextMedia($event, post)">
        ›
      </button>

      <div class="media-dots" *ngIf="hasMultipleMedia(post)">
        <span
          *ngFor="let item of post.media; let index = index"
          class="dot"
          [class.active]="(mediaIndex()[post._id] ) === index">
        </span>
      </div>
    </div>

    <div class="actions-row">
      <button class="icon-btn" (click)="onToggleLike(post)">
        <svg
          *ngIf="!post.isLiked"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          height="24"
          viewBox="0 0 24 24"
          width="24">
          <path
            d="M16.792 3.904A4.989 4.989 0 0121.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.194 2.5 9.122a4.989 4.989 0 014.708-5.218 4.21 4.21 0 013.675 1.941c.325.487.568 1.011.746 1.558.041.14.051.23.051.23s.01-.09.051-.23c.178-.547.421-1.071.746-1.558a4.21 4.21 0 013.675-1.941z">
          </path>
        </svg>
        <svg
          *ngIf="post.isLiked"
          fill="#ed4956"
          height="24"
          viewBox="0 0 48 48"
          width="24">
          <path
            d="M34.6 6.1c5.7 0 10.4 5.2 10.4 11.5 0 6.8-5.9 15.1-15.5 25.3L28.4 44H19.6l-1.1-1.1C8.9 32.7 3 24.4 3 17.6c0-6.3 4.7-11.5 10.4-11.5 3.3 0 6.4 1.8 8.4 4.8 2-3 5.1-4.8 8.4-4.8z">
          </path>
        </svg>
      </button>
      <button class="icon-btn" (click)="toggleCommentComposer(post._id)">
        <svg fill="none" stroke="currentColor" stroke-width="2" height="24" viewBox="0 0 24 24" width="24">
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
      </button>
      <button class="icon-btn save-btn" (click)="onToggleSave(post)">
        <svg
          *ngIf="!post.isSaved"
          fill="none"
          stroke="#111"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
          height="24"
          viewBox="0 0 24 24"
          width="24">
          <polygon points="20 21 12 13.44 4 21 4 3 20 3 20 21"></polygon>
        </svg>
        <svg
          *ngIf="post.isSaved"
          fill="#111"
          stroke="#111"
          stroke-width="1.2"
          height="24"
          viewBox="0 0 24 24"
          width="24">
          <polygon points="20 21 12 13.44 4 21 4 3 20 3 20 21"></polygon>
        </svg>
      </button>
    </div>

    <div class="counts-row">
      <span>{{ post.likesCount || 0 }} likes</span>
      <button class="comments-count-btn" (click)="toggleCommentsPreview(post._id)">
        {{ post.commentsCount || 0 }} comments
      </button>
    </div>

    <div class="post-datetime" *ngIf="post.createdAt">
      {{ post.createdAt | timesAgo }}
    </div>

    <div class="caption" *ngIf="post.caption">
      <button
        class="username-link"
        (click)="goToUserProfile($event, post.user?._id || post.userId)">
        {{ post.user?.userName || post.userName || 'user' }}
      </button>
      <span>{{ post.caption }}</span>
    </div>

    <div class="comments-preview" *ngIf="commentPreviewOpen()[post._id]">
      <div class="comments-state" *ngIf="isCommentsLoading(post._id) && !commentsForPost(post._id).length">
        Loading comments...
      </div>

      <div class="comment-row" *ngFor="let comment of commentsForPost(post._id)">
        <img
          class="comment-avatar"
          [src]="comment.user?.profilePicture ? (comment.user?.profilePicture | imageUrl) : '/default-avatar.svg'"
          alt="Comment user avatar" />
        <div class="comment-main">
          <div class="comment-line">
            <button
              class="comment-user-link"
              (click)="goToUserProfile($event, comment.userId)">
              {{ comment.user?.userName || 'user' }}
            </button>
            <span class="comment-text">{{ comment.content }}</span>
          </div>

          <div class="comment-meta">
            <button class="meta-btn icon-like" (click)="toggleCommentLike(post._id, comment)">
              <svg
                *ngIf="!comment.isLiked"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                height="14"
                viewBox="0 0 24 24"
                width="14">
                <path
                  d="M16.792 3.904A4.989 4.989 0 0121.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.194 2.5 9.122a4.989 4.989 0 014.708-5.218 4.21 4.21 0 013.675 1.941c.325.487.568 1.011.746 1.558.041.14.051.23.051.23s.01-.09.051-.23c.178-.547.421-1.071.746-1.558a4.21 4.21 0 013.675-1.941z">
                </path>
              </svg>
              <svg
                *ngIf="comment.isLiked"
                fill="#ed4956"
                height="14"
                viewBox="0 0 48 48"
                width="14">
                <path
                  d="M34.6 6.1c5.7 0 10.4 5.2 10.4 11.5 0 6.8-5.9 15.1-15.5 25.3L28.4 44H19.6l-1.1-1.1C8.9 32.7 3 24.4 3 17.6c0-6.3 4.7-11.5 10.4-11.5 3.3 0 6.4 1.8 8.4 4.8 2-3 5.1-4.8 8.4-4.8z">
                </path>
              </svg>
              <span *ngIf="(comment.likesCount ?? 0) > 0">{{ comment.likesCount }}</span>
            </button>
            <button class="meta-btn" (click)="toggleReplyComposer(comment._id)">Reply</button>
            <button
              class="meta-btn danger"
              *ngIf="canDeleteComment(post, comment)"
              (click)="deleteComment(post._id, comment)">
              Delete
            </button>
            <button
              class="meta-btn"
              *ngIf="(comment.commentsCount ?? 0) > 0 || repliesForComment(comment._id).length"
              (click)="toggleReplies(post._id, comment._id)">
              {{ repliesOpen()[comment._id] ? 'Hide replies' : 'Show replies' }}
            </button>
          </div>

          <div class="reply-box" *ngIf="replyComposerOpen()[comment._id]">
            <input
              [value]="replyDraft(comment._id)"
              (input)="updateReplyDraft(comment._id, $any($event.target).value)"
              placeholder="Add a reply..." />
            <button
              class="post-btn"
              [disabled]="!replyDraft(comment._id).trim()"
              (click)="submitReply(post._id, comment._id)">
              Reply
            </button>
          </div>

          <div class="replies-state" *ngIf="repliesOpen()[comment._id] && isRepliesLoading(comment._id)">
            Loading replies...
          </div>

          <div class="reply-row" *ngFor="let reply of (repliesOpen()[comment._id] ? repliesForComment(comment._id) : [])">
            <img
              class="comment-avatar mini"
              [src]="reply.user?.profilePicture ? (reply.user?.profilePicture | imageUrl) : '/default-avatar.svg'"
              alt="Reply user avatar" />
            <div class="comment-main">
              <div class="comment-line">
                <button
                  class="comment-user-link"
                  (click)="goToUserProfile($event, reply.userId)">
                  {{ reply.user?.userName || 'user' }}
                </button>
                <span class="comment-text">{{ reply.content }}</span>
              </div>
              <div class="comment-meta compact">
                <button class="meta-btn icon-like" (click)="toggleCommentLike(post._id, reply, comment._id)">
                  <svg
                    *ngIf="!reply.isLiked"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    height="12"
                    viewBox="0 0 24 24"
                    width="12">
                    <path
                      d="M16.792 3.904A4.989 4.989 0 0121.5 9.122c0 3.072-2.652 4.959-5.197 7.222-2.512 2.243-3.865 3.469-4.303 3.752-.477-.309-2.143-1.823-4.303-3.752C5.141 14.072 2.5 12.194 2.5 9.122a4.989 4.989 0 014.708-5.218 4.21 4.21 0 013.675 1.941c.325.487.568 1.011.746 1.558.041.14.051.23.051.23s.01-.09.051-.23c.178-.547.421-1.071.746-1.558a4.21 4.21 0 013.675-1.941z">
                    </path>
                  </svg>
                  <svg
                    *ngIf="reply.isLiked"
                    fill="#ed4956"
                    height="12"
                    viewBox="0 0 48 48"
                    width="12">
                    <path
                      d="M34.6 6.1c5.7 0 10.4 5.2 10.4 11.5 0 6.8-5.9 15.1-15.5 25.3L28.4 44H19.6l-1.1-1.1C8.9 32.7 3 24.4 3 17.6c0-6.3 4.7-11.5 10.4-11.5 3.3 0 6.4 1.8 8.4 4.8 2-3 5.1-4.8 8.4-4.8z">
                    </path>
                  </svg>
                  <span *ngIf="(reply.likesCount ?? 0) > 0">{{ reply.likesCount }}</span>
                </button>
                <button
                  class="meta-btn danger"
                  *ngIf="canDeleteComment(post, reply)"
                  (click)="deleteComment(post._id, reply, comment._id)">
                  Delete
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="comments-state" *ngIf="!isCommentsLoading(post._id) && !commentsForPost(post._id).length">
        No comments yet.
      </div>

      <button
        class="show-more-btn"
        *ngIf="hasMoreComments(post._id)"
        [disabled]="isCommentsLoading(post._id)"
        (click)="loadMoreComments(post._id)">
        {{ isCommentsLoading(post._id) ? 'Loading...' : 'Show more' }}
      </button>
    </div>

    <div class="comment-box" *ngIf="commentComposerOpen()[post._id]">
      <input
        [value]="commentDraft(post._id)"
        (input)="updateCommentDraft(post._id, $any($event.target).value)"
        placeholder="Add a comment..." />
      <button
        class="post-btn"
        [disabled]="!commentDraft(post._id).trim()"
        (click)="submitComment(post._id)">
        Post
      </button>
    </div>
  </article>

  <div class="state" *ngIf="!loading() && !posts().length">No posts yet.</div>

  <div class="load-more-wrap" *ngIf="posts().length && isNext()">
    <button class="load-more-btn" [disabled]="loadingMore()" (click)="loadMore()">
      {{ loadingMore() ? 'Loading...' : 'Load more' }}
    </button>
  </div>

  <div class="end-message" *ngIf="posts().length && !isNext() && !loading() && !loadingMore()">
    You are at the end of the feed.
  </div>
</section>
